name: Update 1fichier links

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas automático
  workflow_dispatch:          # también se puede lanzar manualmente desde GitHub

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch links from 1fichier
        env:
          FICHIER_API_KEY: ${{ secrets.FICHIER_API_KEY }}
        run: python3 .github/scripts/fetch_links.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add links.json
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "chore: update download links [skip ci]"
            git push
          )
